name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test-and-scan:
    name: Test / Lint / Scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.12]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml','**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        # Assumes you have a pyproject.toml with optional "dev" extras
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev] || pip install -e .

      - name: Lint with ruff
        # Install ruff in dev deps or run via pip
        run: |
          if ! command -v ruff >/dev/null 2>&1; then pip install ruff; fi
          ruff check src tests || true
        # Note: keep exit code 0 here initially to prevent CI failure while iterating.
        # Remove "|| true" to make lint blocking once rules are stable.

      - name: Run tests
        run: |
          pytest -q

      - name: Run scanner (text report)
        id: run_text
        run: |
          mkdir -p ci-reports
          reachscan examples/demo_agent --severity none > ci-reports/reachscan-report.txt
          echo "::set-output name=text_report::ci-reports/reachscan-report.txt"

      - name: Run scanner (json report)
        id: run_json
        run: |
          mkdir -p ci-reports
          reachscan examples/demo_agent --json > ci-reports/reachscan-report.json
          # Exits 1 if HIGH reachable capabilities found (default --severity high)
          echo "::set-output name=json_report::ci-reports/reachscan-report.json"

      - name: Upload reports
        uses: actions/upload-artifact@v7
        with:
          name: reachscan-reports-py${{ matrix.python-version }}
          path: ci-reports/

      - name: Show short summary (for logs)
        run: |
          echo "==== short summary of text report ===="
          head -n 40 ci-reports/reachscan-report.txt || true
